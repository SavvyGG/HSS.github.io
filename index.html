<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <meta name="theme-color" content="#2a7c6f"/>
  <meta name="description" content="Haraiya Secondary School — Official Web App"/>
  <title>Haraiya Secondary School</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">

  <!-- Stylesheets — order matters -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/news.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<!-- NAVBAR (rendered by js/nav.js) -->
<header id="navbar" class="navbar"></header>

<!-- APP — all pages render here (js/pages.js) -->
<main id="app" class="page-content"></main>

<!-- TOAST notification -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toast-icon">✅</span>
  <span id="toast-msg"></span>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('auth-modal')">✕</button>
    <div id="auth-modal-content"></div>
  </div>
</div>

<!-- FEEDBACK MODAL -->
<div class="modal-overlay" id="feedback-view-modal">
  <div class="modal-box" style="max-width:600px">
    <button class="modal-close" onclick="closeModal('feedback-view-modal')">✕</button>
    <div id="feedback-view-content"></div>
  </div>
</div>

<!-- Scripts — order matters: data → auth → nav → pages → app -->
<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/pages.js"></script>
<script src="js/app.js"></script>

</body>
</html>
